name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

# Cancel in-progress runs for the same ref
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  # ── Create draft release so build jobs can upload directly ─────────
  create-release:
    runs-on: [self-hosted, Linux, X64]
    name: Create draft release
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      release_id: ${{ steps.create.outputs.release_id }}
      upload_url: ${{ steps.create.outputs.upload_url }}

    steps:
      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete old artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            for (const artifact of artifacts) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }
            console.log(`Deleted ${artifacts.length} old artifacts`);

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.version.outputs.tag }}';
            const { owner, repo } = context.repo;
            const isPrerelease = /beta|alpha|rc/.test(tag);

            // Delete existing release if re-running
            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.deleteRelease({ owner, repo, release_id: existing.id });
              console.log(`Deleted existing release for ${tag}`);
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            // For workflow_dispatch, create the tag ourselves. For tag push,
            // the tag already exists at the triggering ref.
            if (context.eventName === 'workflow_dispatch') {
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
                console.log(`Deleted existing tag ${tag}`);
              } catch (e) {
                if (e.status !== 422 && e.status !== 404) throw e;
              }
              const { data: mainRef } = await github.rest.git.getRef({ owner, repo, ref: 'heads/main' });
              await github.rest.git.createRef({
                owner, repo,
                ref: `refs/tags/${tag}`,
                sha: mainRef.object.sha,
              });
              console.log(`Created tag ${tag} at ${mainRef.object.sha.substring(0, 7)}`);
            }

            const { data: release } = await github.rest.repos.createRelease({
              owner, repo,
              tag_name: tag,
              target_commitish: 'main',
              name: `Conduit ${tag}`,
              draft: true,
              prerelease: isPrerelease,
              body: `## Conduit ${tag}\n\n### Downloads\n\n| Platform | File |\n|----------|------|\n| macOS (Apple Silicon) | \`.dmg\` installer |\n| Windows (x64) | \`.exe\` installer |\n| Linux (x64) | \`.AppImage\` or \`.deb\` |\n\n---\n*Auto-update is built in — existing installations will update automatically.*`,
            });
            console.log(`Created draft release: ${release.html_url}`);
            core.setOutput('release_id', release.id.toString());
            core.setOutput('upload_url', release.upload_url);

  # ── Build FreeRDP + App + upload to release (single job per platform) ──
  build:
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: [self-hosted, macOS, ARM64]
            platform: darwin
            arch: arm64
            eb_flags: --mac --arm64
          - os: [self-hosted, Windows, X64]
            platform: win32
            arch: x64
            eb_flags: --win --x64
          - os: [self-hosted, Linux, X64]
            platform: linux
            arch: x64
            eb_flags: --linux --x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      # Git's MSYS tar.exe has been renamed on the Windows runner so that
      # actions/cache falls back to Windows system tar (handles C: paths).
      # System tar still needs gzip.exe in PATH for compression.
      - name: Fix PATH for cache (Windows)
        if: matrix.platform == 'win32'
        shell: powershell
        run: |
          $shimDir = Join-Path $env:RUNNER_TEMP "cache-shim"
          New-Item -ItemType Directory -Force -Path $shimDir | Out-Null
          $gitGzip = "C:\Program Files\Git\usr\bin\gzip.exe"
          if (Test-Path $gitGzip) {
            Copy-Item $gitGzip (Join-Path $shimDir "gzip.exe") -Force
            Write-Host "Copied gzip.exe to $shimDir"
          }
          echo $shimDir >> $env:GITHUB_PATH

      # ── Local persistent FreeRDP bundle cache ────────────────────────
      # Self-hosted runners persist $HOME across runs.  Store the built
      # bundle in ~/.conduit-build-cache/ keyed by source hash.  This
      # avoids GitHub Actions branch-scoped cache issues where tag refs
      # can't see caches saved by other tags.
      - name: Restore FreeRDP bundle (local cache, Unix)
        if: matrix.platform != 'win32'
        id: freerdp-bundle-cache
        shell: bash
        run: |
          HASH="${{ hashFiles('freerdp-helper/src/**', 'freerdp-helper/CMakeLists.txt', 'freerdp-helper/build-freerdp.sh', 'freerdp-helper/scripts/**') }}"
          CACHE_KEY="freerdp-bundle-${{ matrix.platform }}-${{ matrix.arch }}-${HASH}"
          CACHE_DIR="$HOME/.conduit-build-cache/$CACHE_KEY"
          BUNDLE_DIR="freerdp-helper/bundle/${{ matrix.platform }}"

          if [ -d "$CACHE_DIR" ] && [ -n "$(ls -A "$CACHE_DIR" 2>/dev/null)" ]; then
            echo "Local cache hit: $CACHE_KEY"
            rm -rf "$BUNDLE_DIR"
            mkdir -p "$BUNDLE_DIR"
            cp -r "$CACHE_DIR/." "$BUNDLE_DIR/"
            echo "cache-hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "Local cache miss: ${CACHE_KEY:0:60}..."
            echo "cache-hit=false" >> "$GITHUB_OUTPUT"
          fi
          echo "cache-dir=$CACHE_DIR" >> "$GITHUB_OUTPUT"

      - name: Restore FreeRDP bundle (local cache, Windows)
        if: matrix.platform == 'win32'
        id: freerdp-bundle-cache-win
        shell: powershell
        run: |
          $hash = "${{ hashFiles('freerdp-helper/src/**', 'freerdp-helper/CMakeLists.txt', 'freerdp-helper/build-freerdp.sh', 'freerdp-helper/scripts/**') }}"
          $cacheKey = "freerdp-bundle-win32-x64-$hash"
          $cacheDir = Join-Path $env:USERPROFILE ".conduit-build-cache\$cacheKey"
          $bundleDir = "freerdp-helper\bundle\win32"

          if ((Test-Path $cacheDir) -and (Get-ChildItem $cacheDir -ErrorAction SilentlyContinue).Count -gt 0) {
            Write-Host "Local cache hit: $cacheKey"
            if (Test-Path $bundleDir) { Remove-Item -Recurse -Force $bundleDir }
            New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null
            Copy-Item -Recurse -Force "$cacheDir\*" $bundleDir
            echo "cache-hit=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Local cache miss: $($cacheKey.Substring(0, [Math]::Min(60, $cacheKey.Length)))..."
            echo "cache-hit=false" >> $env:GITHUB_OUTPUT
          }
          echo "cache-dir=$cacheDir" >> $env:GITHUB_OUTPUT

      # ── Platform setup (only when FreeRDP needs building) ────────────
      - name: Install build tools (macOS)
        if: matrix.platform == 'darwin' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        run: brew install cmake ninja

      # ilammy/msvc-dev-cmd can't find VS 2022 Build Tools (path uses \2022\
      # not \17\, and vswhere needs -products * for Build Tools).
      # Call vcvarsall.bat directly from the known VS 2022 path instead.
      - name: Set up MSVC (Windows)
        if: matrix.platform == 'win32' && steps.freerdp-bundle-cache-win.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          @echo off
          if exist "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" (
            echo Using VS 2022 Build Tools
            call "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64
          ) else if exist "C:\Program Files (x86)\Microsoft Visual Studio\18\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" (
            echo Using VS 2025 Build Tools
            call "C:\Program Files (x86)\Microsoft Visual Studio\18\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64
          ) else (
            echo ERROR: No vcvarsall.bat found
            exit /b 1
          )
          echo VSINSTALLDIR=%VSINSTALLDIR%>> %GITHUB_ENV%
          echo VCToolsInstallDir=%VCToolsInstallDir%>> %GITHUB_ENV%
          echo VCINSTALLDIR=%VCINSTALLDIR%>> %GITHUB_ENV%
          echo VCToolsVersion=%VCToolsVersion%>> %GITHUB_ENV%
          echo VisualStudioVersion=%VisualStudioVersion%>> %GITHUB_ENV%
          echo WindowsSdkDir=%WindowsSdkDir%>> %GITHUB_ENV%
          echo WindowsSDKVersion=%WindowsSDKVersion%>> %GITHUB_ENV%
          echo UCRTVersion=%UCRTVersion%>> %GITHUB_ENV%
          echo INCLUDE=%INCLUDE%>> %GITHUB_ENV%
          echo LIB=%LIB%>> %GITHUB_ENV%
          echo LIBPATH=%LIBPATH%>> %GITHUB_ENV%
          echo PATH=%PATH%>> %GITHUB_PATH%

      - name: Install Strawberry Perl (Windows)
        if: matrix.platform == 'win32' && steps.freerdp-bundle-cache-win.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $installDir = "C:\Strawberry"
          $perlBin = "$installDir\perl\bin"
          $perlOk = $false

          # Self-hosted runner: Perl files persist but GITHUB_PATH is per-job.
          # Re-add to PATH first so Get-Command can find it.
          if (Test-Path "$perlBin\perl.exe") {
            $env:PATH = "$perlBin;$env:PATH"
            # IMPORTANT: Only add perl/bin, NOT c/bin. Strawberry's c/bin contains
            # gcc, cmake, and ninja which would override MSVC in PATH.
            "$perlBin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          }

          if (Get-Command perl -ErrorAction SilentlyContinue) {
            try {
              $null = perl -e "use Socket; print 1" 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "Perl already available and working"
                perl -v | Select-String -Pattern "version"
                $perlOk = $true
              } else {
                Write-Host "Existing Perl has broken modules, reinstalling..."
              }
            } catch {
              Write-Host "Existing Perl is broken, reinstalling..."
            }
          }
          if (-not $perlOk) {
            Write-Host "Installing Strawberry Perl Portable..."
            if (Test-Path $installDir) { Remove-Item -Recurse -Force $installDir }
            $urls = @(
              "https://github.com/StrawberryPerl/Perl-Dist-Strawberry/releases/download/SP_54001_64bit_UCRT/strawberry-perl-5.40.0.1-64bit-portable.zip",
              "https://github.com/StrawberryPerl/Perl-Dist-Strawberry/releases/download/SP_53822_64bit/strawberry-perl-5.38.2.2-64bit-portable.zip"
            )
            $zipPath = "$env:RUNNER_TEMP\strawberry-perl.zip"
            $downloaded = $false
            foreach ($url in $urls) {
              try {
                Write-Host "Trying: $url"
                Invoke-WebRequest -Uri $url -OutFile $zipPath -ErrorAction Stop
                $downloaded = $true
                break
              } catch {
                Write-Host "Failed: $_"
              }
            }
            if (-not $downloaded) { throw "Could not download Strawberry Perl" }
            Expand-Archive -Path $zipPath -DestinationPath $installDir -Force
            "$perlBin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
            Remove-Item $zipPath
            Write-Host "Strawberry Perl installed to $installDir"
          }

      - name: Install build tools (Linux)
        if: matrix.platform == 'linux' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build patchelf pkg-config \
            build-essential nasm libkrb5-dev libicu-dev

      # ── Cache FreeRDP compiled deps (OpenSSL, FFmpeg, etc.) ──────────
      - name: Cache FreeRDP deps (Unix)
        if: matrix.platform != 'win32' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: freerdp-helper/deps/install
          key: freerdp-deps-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('freerdp-helper/build-freerdp.sh') }}
          restore-keys: |
            freerdp-deps-${{ matrix.platform }}-${{ matrix.arch }}-

      - name: Cache FreeRDP deps (Windows)
        if: matrix.platform == 'win32' && steps.freerdp-bundle-cache-win.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: freerdp-helper/deps/install
          key: freerdp-deps-win32-x64-${{ hashFiles('freerdp-helper/scripts/build-windows.ps1') }}
          restore-keys: |
            freerdp-deps-win32-x64-

      # ── Clean stale deps on self-hosted runners ──────────────────────
      - name: Clean stale deps (Unix)
        if: matrix.platform != 'win32' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        run: |
          # Self-hosted runners persist workspace between runs.
          # Remove old source/build dirs (not cached) so builds use fresh source.
          rm -rf freerdp-helper/deps/openssl-src freerdp-helper/deps/ffmpeg-src \
                 freerdp-helper/deps/freerdp-src freerdp-helper/deps/freerdp-build \
                 freerdp-helper/build

      - name: Clean stale deps (Windows)
        if: matrix.platform == 'win32' && steps.freerdp-bundle-cache-win.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          # Self-hosted runners persist workspace. Remove old build artifacts.
          $dirs = @(
            "freerdp-helper\deps\openssl-src",
            "freerdp-helper\deps\zlib-src",
            "freerdp-helper\deps\zlib-build",
            "freerdp-helper\deps\freerdp-src",
            "freerdp-helper\deps\freerdp-build",
            "freerdp-helper\build-win"
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) { Remove-Item -Recurse -Force $d; Write-Host "Cleaned: $d" }
          }

      # ── Build FreeRDP (skipped when bundle is cached) ────────────────
      - name: Build FreeRDP (macOS)
        if: matrix.platform == 'darwin' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        working-directory: freerdp-helper
        run: |
          bash build-freerdp.sh
          bash scripts/build-macos.sh
          bash scripts/bundle-macos.sh

      - name: Build FreeRDP (Windows)
        if: matrix.platform == 'win32' && steps.freerdp-bundle-cache-win.outputs.cache-hit != 'true'
        working-directory: freerdp-helper
        shell: cmd
        run: powershell -ExecutionPolicy Bypass -File scripts\build-windows.ps1

      - name: Build FreeRDP (Linux)
        if: matrix.platform == 'linux' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        working-directory: freerdp-helper
        run: |
          bash build-freerdp.sh
          bash scripts/build-linux.sh

      # ── Save FreeRDP bundle to local cache ──────────────────────────
      - name: Save FreeRDP bundle (local cache, Unix)
        if: matrix.platform != 'win32' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          CACHE_DIR="${{ steps.freerdp-bundle-cache.outputs.cache-dir }}"
          BUNDLE_DIR="freerdp-helper/bundle/${{ matrix.platform }}"
          if [ -d "$BUNDLE_DIR" ] && [ -n "$(ls -A "$BUNDLE_DIR" 2>/dev/null)" ]; then
            # Clean old caches for this platform (keep only current hash)
            for d in "$HOME/.conduit-build-cache"/freerdp-bundle-${{ matrix.platform }}-${{ matrix.arch }}-*; do
              [ "$d" != "$CACHE_DIR" ] && [ -d "$d" ] && rm -rf "$d"
            done
            mkdir -p "$CACHE_DIR"
            cp -r "$BUNDLE_DIR/." "$CACHE_DIR/"
            echo "Saved bundle to local cache: $CACHE_DIR"
          fi

      - name: Save FreeRDP bundle (local cache, Windows)
        if: matrix.platform == 'win32' && steps.freerdp-bundle-cache-win.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $cacheDir = "${{ steps.freerdp-bundle-cache-win.outputs.cache-dir }}"
          $bundleDir = "freerdp-helper\bundle\win32"
          if ((Test-Path $bundleDir) -and (Get-ChildItem $bundleDir -ErrorAction SilentlyContinue).Count -gt 0) {
            # Clean old caches for this platform (keep only current hash)
            $cacheParent = Join-Path $env:USERPROFILE ".conduit-build-cache"
            Get-ChildItem "$cacheParent\freerdp-bundle-win32-x64-*" -Directory -ErrorAction SilentlyContinue | Where-Object { $_.FullName -ne $cacheDir } | Remove-Item -Recurse -Force
            New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
            Copy-Item -Recurse -Force "$bundleDir\*" $cacheDir
            Write-Host "Saved bundle to local cache: $cacheDir"
          }

      - name: Verify FreeRDP bundle (Unix)
        if: matrix.platform != 'win32'
        run: |
          BUNDLE_DIR="freerdp-helper/bundle/${{ matrix.platform }}"
          echo "=== FreeRDP bundle (${{ matrix.platform }}) ==="
          ls -lh "$BUNDLE_DIR/"
          file "$BUNDLE_DIR/conduit-freerdp"
          if [ "${{ steps.freerdp-bundle-cache.outputs.cache-hit }}" = "true" ]; then
            echo "(restored from cache)"
          else
            echo "(freshly built)"
          fi

          # Verify rpaths on macOS — fail build if dev paths leaked into bundle
          if [ "${{ matrix.platform }}" = "darwin" ]; then
            echo ""
            echo "=== Verifying rpaths ==="
            BAD_REFS=0
            while IFS= read -r line; do
              dep=$(echo "$line" | awk '{print $1}')
              case "$dep" in
                /usr/lib/*|/System/*|@loader_path/*|@executable_path/*|@rpath/*) ;;
                "") ;;
                *)
                  echo "FAIL: conduit-freerdp has non-portable reference: $dep"
                  BAD_REFS=$((BAD_REFS + 1))
                  ;;
              esac
            done < <(otool -L "$BUNDLE_DIR/conduit-freerdp" | tail -n +2)

            # Check that @rpath references have a valid @loader_path rpath (not dev paths)
            DEV_RPATHS=0
            while IFS= read -r rp; do
              rp=$(echo "$rp" | xargs)
              case "$rp" in
                @loader_path*|@executable_path*) ;;
                *)
                  echo "FAIL: conduit-freerdp has non-portable rpath: $rp"
                  DEV_RPATHS=$((DEV_RPATHS + 1))
                  ;;
              esac
            done < <(otool -l "$BUNDLE_DIR/conduit-freerdp" | grep -A2 LC_RPATH | grep "path " | sed 's/^[[:space:]]*path //' | sed 's/ (offset.*//')

            if [ "$BAD_REFS" -gt 0 ] || [ "$DEV_RPATHS" -gt 0 ]; then
              echo ""
              echo "ERROR: FreeRDP binary has non-portable references or rpaths."
              echo "This will cause 'Library not loaded' crashes on end-user machines."
              exit 1
            fi
            echo "All references are portable."
          fi

      - name: Verify FreeRDP bundle (Windows)
        if: matrix.platform == 'win32'
        shell: powershell
        run: |
          $bundleDir = "freerdp-helper\bundle\win32"
          Write-Host "=== FreeRDP bundle (win32) ==="
          if (Test-Path $bundleDir) {
            Get-ChildItem $bundleDir | ForEach-Object {
              Write-Host ("  {0} - {1:N1} MB" -f $_.Name, ($_.Length / 1MB))
            }
            $osslDir = Join-Path $bundleDir "ossl-modules"
            if (Test-Path $osslDir) {
              Write-Host "  ossl-modules/"
              Get-ChildItem $osslDir | ForEach-Object {
                Write-Host ("    {0} - {1:N1} MB" -f $_.Name, ($_.Length / 1MB))
              }
            } else {
              Write-Host "  WARNING: ossl-modules/ not found - NTLM/NLA may not work"
            }
          } else {
            Write-Host "ERROR: Bundle dir not found at $bundleDir"
            exit 1
          }
          if ("${{ steps.freerdp-bundle-cache-win.outputs.cache-hit }}" -eq "true") {
            Write-Host "(restored from cache)"
          } else {
            Write-Host "(freshly built)"
          }

      # ── Build Electron app ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Cache Electron binary download ──────────────────────────────
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
            ~/.cache/electron
          key: electron-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ matrix.platform }}-${{ matrix.arch }}-

      # Python is needed for node-gyp (builds native modules like node-pty).
      # actions/setup-python doesn't work on self-hosted runners:
      #   macOS: fails with "mkdir /Users/runner: Permission denied"
      #   Windows: fails with "Requested registry access is not allowed"
      # So we only use it on Linux and handle other platforms differently.
      - name: Setup Python (Linux)
        if: matrix.platform == 'linux'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python (Windows)
        if: matrix.platform == 'win32'
        shell: powershell
        run: |
          # Download embeddable Python 3.11 (just a zip, no installer/admin needed).
          # Then install setuptools to provide the distutils module for node-gyp.
          $version = "3.11.9"
          $url = "https://www.python.org/ftp/python/$version/python-$version-embed-amd64.zip"
          $zipPath = "$env:RUNNER_TEMP\python-embed.zip"
          $pythonDir = "$env:RUNNER_TEMP\python311"
          Write-Host "Downloading Python $version embeddable..."
          Invoke-WebRequest -Uri $url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $pythonDir -Force
          # Enable site-packages by uncommenting import site in python311._pth
          $pthFile = Get-ChildItem "$pythonDir\python*._pth" | Select-Object -First 1
          (Get-Content $pthFile.FullName) -replace '#import site', 'import site' | Set-Content $pthFile.FullName
          # Install pip + setuptools (provides distutils for node-gyp)
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "$env:RUNNER_TEMP\get-pip.py"
          & "$pythonDir\python.exe" "$env:RUNNER_TEMP\get-pip.py" --no-warn-script-location
          & "$pythonDir\python.exe" -m pip install setuptools --no-warn-script-location
          & "$pythonDir\python.exe" --version
          "$pythonDir" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          "$pythonDir\Scripts" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          Write-Host "Python ready at: $pythonDir"

      # node-gyp's bundled vswhere call doesn't use -products * flag, so it
      # can't discover VS Build Tools. Install latest global node-gyp which
      # supports Build Tools discovery, and tell npm to use it.
      - name: Configure node-gyp for VS Build Tools (Windows)
        if: matrix.platform == 'win32'
        shell: powershell
        run: |
          npm install -g node-gyp@latest
          $globalNodeGyp = Join-Path (npm root -g) "node-gyp\bin\node-gyp.js"
          Write-Host "Global node-gyp: $(node $globalNodeGyp --version) at $globalNodeGyp"
          echo "npm_config_node_gyp=$globalNodeGyp" >> $env:GITHUB_ENV
          echo "GYP_MSVS_VERSION=2022" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Build MCP server
        working-directory: mcp
        run: |
          npm ci
          npm run build

      - name: Build app
        run: npm run build

      - name: Install .NET SDK (Windows)
        if: matrix.platform == 'win32'
        shell: powershell
        run: |
          # actions/setup-dotnet can't write to C:\Program Files\dotnet on self-hosted runners.
          # Install .NET 8 SDK to a user-writable directory instead.
          $dotnetDir = "$env:RUNNER_TEMP\dotnet"
          if (Test-Path "$dotnetDir\dotnet.exe") {
            $existing = & "$dotnetDir\dotnet.exe" --version 2>$null
            if ($existing -match '^8\.') {
              Write-Host ".NET SDK $existing already installed"
              "$dotnetDir" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
              echo "DOTNET_ROOT=$dotnetDir" >> $env:GITHUB_ENV
              return
            }
          }
          Write-Host "Installing .NET 8 SDK..."
          $installScript = "$env:RUNNER_TEMP\dotnet-install.ps1"
          Invoke-WebRequest -Uri "https://dot.net/v1/dotnet-install.ps1" -OutFile $installScript
          & $installScript -Channel 8.0 -InstallDir $dotnetDir
          "$dotnetDir" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          echo "DOTNET_ROOT=$dotnetDir" >> $env:GITHUB_ENV
          & "$dotnetDir\dotnet.exe" --version

      - name: Build WebView2 helper (Windows)
        if: matrix.platform == 'win32'
        shell: powershell
        run: |
          dotnet publish webview2-helper/ConduitWebView2/ConduitWebView2.csproj `
            -c Release -r win-x64 --self-contained false `
            -o webview2-helper/bundle/win-x64/
          Write-Host "=== WebView2 helper bundle ==="
          Get-ChildItem webview2-helper/bundle/win-x64/ | ForEach-Object {
            Write-Host ("  {0} - {1:N1} KB" -f $_.Name, ($_.Length / 1KB))
          }

      - name: Package with electron-builder
        run: npx electron-builder ${{ matrix.eb_flags }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (ignored on other platforms)
          CSC_LINK: ${{ matrix.platform == 'darwin' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'darwin' && secrets.CSC_KEY_PASSWORD || '' }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.platform == 'darwin' && 'true' || 'false' }}
          # macOS notarization (ignored on other platforms)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # ── Upload directly to release (no artifacts needed) ──────────────
      - name: Upload installers to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { owner, repo } = context.repo;
            const releaseId = parseInt('${{ needs.create-release.outputs.release_id }}', 10);
            const platform = '${{ matrix.platform }}';

            // Get current assets on the release (for clobber on rerun)
            const { data: release } = await github.rest.repos.getRelease({ owner, repo, release_id: releaseId });

            // Define which files to upload per platform
            const patterns = {
              darwin: ['*.dmg', '*.dmg.blockmap', '*-mac.zip', '*-mac.zip.blockmap', 'latest-mac.yml'],
              win32: ['*Setup*.exe', '*Setup*.exe.blockmap', 'latest.yml'],
              linux: ['*.AppImage', '*.deb', 'latest-linux.yml'],
            };

            const releaseDir = 'release';
            const files = fs.readdirSync(releaseDir);
            const toUpload = [];

            for (const pattern of patterns[platform] || []) {
              const regex = new RegExp('^' + pattern.replace(/\./g, '\\.').replace(/\*/g, '.*') + '$');
              for (const file of files) {
                if (regex.test(file) && !toUpload.includes(file)) {
                  toUpload.push(file);
                }
              }
            }

            console.log(`Uploading ${toUpload.length} files for ${platform}:`, toUpload);

            for (const file of toUpload) {
              const filePath = path.join(releaseDir, file);
              const stat = fs.statSync(filePath);
              const data = fs.readFileSync(filePath);

              // Delete existing asset with same name (for reruns)
              const existing = release.assets.find(a => a.name === file);
              if (existing) {
                await github.rest.repos.deleteReleaseAsset({ owner, repo, asset_id: existing.id });
                console.log(`  Replaced: ${file}`);
              }

              await github.rest.repos.uploadReleaseAsset({
                owner, repo,
                release_id: releaseId,
                name: file,
                data,
                headers: { 'content-type': 'application/octet-stream', 'content-length': stat.size },
              });
              console.log(`  Uploaded: ${file} (${(stat.size / 1024 / 1024).toFixed(1)} MB)`);
            }

  # ── Publish (undraft) the release ──────────────────────────────────
  publish-release:
    needs: [create-release, build]
    runs-on: [self-hosted, Linux, X64]
    name: Publish Release

    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId = parseInt('${{ needs.create-release.outputs.release_id }}', 10);
            const { owner, repo } = context.repo;
            await github.rest.repos.updateRelease({ owner, repo, release_id: releaseId, draft: false });
            console.log(`Release published!`);
