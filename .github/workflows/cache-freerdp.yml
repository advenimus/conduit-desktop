name: Cache FreeRDP

# Warm the FreeRDP bundle cache on main so tag-triggered release builds
# can restore it.  GitHub Actions caches are branch-scoped: a cache saved
# under refs/tags/v0.3.1 is invisible to refs/tags/v0.3.2.  Only caches
# saved under the default branch (main) are accessible to all refs.

on:
  push:
    branches: [main]
    paths:
      - 'freerdp-helper/src/**'
      - 'freerdp-helper/CMakeLists.txt'
      - 'freerdp-helper/build-freerdp.sh'
      - 'freerdp-helper/scripts/**'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: cache-freerdp-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  cache:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: [self-hosted, macOS, ARM64]
            platform: darwin
            arch: arm64
          - os: [self-hosted, Windows, X64]
            platform: win32
            arch: x64
          - os: [self-hosted, Linux, X64]
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}
    name: Cache (${{ matrix.platform }}-${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      # Git's MSYS tar.exe has been renamed on the Windows runner so that
      # actions/cache falls back to Windows system tar (handles C: paths).
      # System tar still needs gzip.exe in PATH for compression.
      - name: Fix PATH for cache (Windows)
        if: matrix.platform == 'win32'
        shell: powershell
        run: |
          $shimDir = Join-Path $env:RUNNER_TEMP "cache-shim"
          New-Item -ItemType Directory -Force -Path $shimDir | Out-Null
          $gitGzip = "C:\Program Files\Git\usr\bin\gzip.exe"
          if (Test-Path $gitGzip) {
            Copy-Item $gitGzip (Join-Path $shimDir "gzip.exe") -Force
            Write-Host "Copied gzip.exe to $shimDir"
          }
          echo $shimDir >> $env:GITHUB_PATH

      # ── Cache keys MUST match release.yml exactly ──────────────────
      - name: Cache FreeRDP bundle
        id: freerdp-bundle-cache
        uses: actions/cache@v4
        with:
          path: freerdp-helper/bundle/${{ matrix.platform }}
          key: freerdp-bundle-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('freerdp-helper/src/**', 'freerdp-helper/CMakeLists.txt', 'freerdp-helper/build-freerdp.sh', 'freerdp-helper/scripts/**') }}

      # ── Platform setup (only when FreeRDP needs building) ──────────
      - name: Install build tools (macOS)
        if: matrix.platform == 'darwin' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        run: arch -arm64 brew install cmake ninja

      - name: Set up MSVC (Windows)
        if: matrix.platform == 'win32' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          @echo off
          if exist "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" (
            echo Using VS 2022 Build Tools
            call "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64
          ) else if exist "C:\Program Files (x86)\Microsoft Visual Studio\18\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" (
            echo Using VS 2025 Build Tools
            call "C:\Program Files (x86)\Microsoft Visual Studio\18\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" x64
          ) else (
            echo ERROR: No vcvarsall.bat found
            exit /b 1
          )
          echo VSINSTALLDIR=%VSINSTALLDIR%>> %GITHUB_ENV%
          echo VCToolsInstallDir=%VCToolsInstallDir%>> %GITHUB_ENV%
          echo VCINSTALLDIR=%VCINSTALLDIR%>> %GITHUB_ENV%
          echo VCToolsVersion=%VCToolsVersion%>> %GITHUB_ENV%
          echo VisualStudioVersion=%VisualStudioVersion%>> %GITHUB_ENV%
          echo WindowsSdkDir=%WindowsSdkDir%>> %GITHUB_ENV%
          echo WindowsSDKVersion=%WindowsSDKVersion%>> %GITHUB_ENV%
          echo UCRTVersion=%UCRTVersion%>> %GITHUB_ENV%
          echo INCLUDE=%INCLUDE%>> %GITHUB_ENV%
          echo LIB=%LIB%>> %GITHUB_ENV%
          echo LIBPATH=%LIBPATH%>> %GITHUB_ENV%
          echo PATH=%PATH%>> %GITHUB_PATH%

      - name: Install Strawberry Perl (Windows)
        if: matrix.platform == 'win32' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $installDir = "C:\Strawberry"
          $perlBin = "$installDir\perl\bin"
          $perlOk = $false

          # Self-hosted runner: Perl files persist but GITHUB_PATH is per-job.
          # Re-add to PATH first so Get-Command can find it.
          if (Test-Path "$perlBin\perl.exe") {
            $env:PATH = "$perlBin;$env:PATH"
            "$perlBin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
          }

          if (Get-Command perl -ErrorAction SilentlyContinue) {
            try {
              $null = perl -e "use Socket; print 1" 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "Perl already available and working"
                perl -v | Select-String -Pattern "version"
                $perlOk = $true
              } else {
                Write-Host "Existing Perl has broken modules, reinstalling..."
              }
            } catch {
              Write-Host "Existing Perl is broken, reinstalling..."
            }
          }
          if (-not $perlOk) {
            Write-Host "Installing Strawberry Perl Portable..."
            if (Test-Path $installDir) { Remove-Item -Recurse -Force $installDir }
            $urls = @(
              "https://github.com/StrawberryPerl/Perl-Dist-Strawberry/releases/download/SP_54001_64bit_UCRT/strawberry-perl-5.40.0.1-64bit-portable.zip",
              "https://github.com/StrawberryPerl/Perl-Dist-Strawberry/releases/download/SP_53822_64bit/strawberry-perl-5.38.2.2-64bit-portable.zip"
            )
            $zipPath = "$env:RUNNER_TEMP\strawberry-perl.zip"
            $downloaded = $false
            foreach ($url in $urls) {
              try {
                Write-Host "Trying: $url"
                Invoke-WebRequest -Uri $url -OutFile $zipPath -ErrorAction Stop
                $downloaded = $true
                break
              } catch {
                Write-Host "Failed: $_"
              }
            }
            if (-not $downloaded) { throw "Could not download Strawberry Perl" }
            Expand-Archive -Path $zipPath -DestinationPath $installDir -Force
            "$perlBin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8
            Remove-Item $zipPath
            Write-Host "Strawberry Perl installed to $installDir"
          }

      - name: Install build tools (Linux)
        if: matrix.platform == 'linux' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build patchelf pkg-config \
            build-essential nasm libkrb5-dev libicu-dev \
            zlib1g-dev libasound2-dev libpulse-dev libssl-dev

      # ── Cache FreeRDP compiled deps (OpenSSL, FFmpeg, etc.) ────────
      - name: Cache FreeRDP deps (Unix)
        if: matrix.platform != 'win32' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: freerdp-helper/deps/install
          key: freerdp-deps-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('freerdp-helper/build-freerdp.sh') }}
          restore-keys: |
            freerdp-deps-${{ matrix.platform }}-${{ matrix.arch }}-

      - name: Cache FreeRDP deps (Windows)
        if: matrix.platform == 'win32' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: freerdp-helper/deps/install
          key: freerdp-deps-win32-x64-${{ hashFiles('freerdp-helper/scripts/build-windows.ps1') }}
          restore-keys: |
            freerdp-deps-win32-x64-

      # ── Clean stale deps on self-hosted runners ────────────────────
      - name: Clean stale deps (Unix)
        if: matrix.platform != 'win32' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        run: |
          rm -rf freerdp-helper/deps/openssl-src freerdp-helper/deps/ffmpeg-src \
                 freerdp-helper/deps/freerdp-src freerdp-helper/deps/freerdp-build \
                 freerdp-helper/build

      - name: Clean stale deps (Windows)
        if: matrix.platform == 'win32' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $dirs = @(
            "freerdp-helper\deps\openssl-src",
            "freerdp-helper\deps\zlib-src",
            "freerdp-helper\deps\zlib-build",
            "freerdp-helper\deps\freerdp-src",
            "freerdp-helper\deps\freerdp-build",
            "freerdp-helper\build-win"
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) { Remove-Item -Recurse -Force $d; Write-Host "Cleaned: $d" }
          }

      # ── Build FreeRDP (skipped when bundle is cached) ──────────────
      - name: Build FreeRDP (macOS)
        if: matrix.platform == 'darwin' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        working-directory: freerdp-helper
        run: |
          bash build-freerdp.sh
          bash scripts/build-macos.sh
          bash scripts/bundle-macos.sh

      - name: Build FreeRDP (Windows)
        if: matrix.platform == 'win32' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        working-directory: freerdp-helper
        shell: cmd
        run: powershell -ExecutionPolicy Bypass -File scripts\build-windows.ps1

      - name: Build FreeRDP (Linux)
        if: matrix.platform == 'linux' && steps.freerdp-bundle-cache.outputs.cache-hit != 'true'
        working-directory: freerdp-helper
        run: |
          bash build-freerdp.sh
          bash scripts/build-linux.sh

      # ── Verify bundle exists ───────────────────────────────────────
      - name: Verify FreeRDP bundle (Unix)
        if: matrix.platform != 'win32'
        run: |
          BUNDLE_DIR="freerdp-helper/bundle/${{ matrix.platform }}"
          echo "=== FreeRDP bundle (${{ matrix.platform }}) ==="
          ls -lh "$BUNDLE_DIR/"
          file "$BUNDLE_DIR/conduit-freerdp"
          if [ "${{ steps.freerdp-bundle-cache.outputs.cache-hit }}" = "true" ]; then
            echo "(restored from cache -- no build needed)"
          else
            echo "(freshly built and cached for release builds)"
          fi

      - name: Verify FreeRDP bundle (Windows)
        if: matrix.platform == 'win32'
        shell: powershell
        run: |
          $bundleDir = "freerdp-helper\bundle\win32"
          Write-Host "=== FreeRDP bundle (win32) ==="
          if (Test-Path $bundleDir) {
            Get-ChildItem $bundleDir | ForEach-Object {
              Write-Host ("  {0} - {1:N1} MB" -f $_.Name, ($_.Length / 1MB))
            }
            $osslDir = Join-Path $bundleDir "ossl-modules"
            if (Test-Path $osslDir) {
              Write-Host "  ossl-modules/"
              Get-ChildItem $osslDir | ForEach-Object {
                Write-Host ("    {0} - {1:N1} MB" -f $_.Name, ($_.Length / 1MB))
              }
            } else {
              Write-Host "  WARNING: ossl-modules/ not found - NTLM/NLA may not work"
            }
          } else {
            Write-Host "ERROR: Bundle dir not found at $bundleDir"
            exit 1
          }
          if ("${{ steps.freerdp-bundle-cache.outputs.cache-hit }}" -eq "true") {
            Write-Host "(restored from cache -- no build needed)"
          } else {
            Write-Host "(freshly built and cached for release builds)"
          }
